services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: prediction
      POSTGRES_USER: prediction
      POSTGRES_PASSWORD: prediction
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prediction -d prediction"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://prediction:prediction@postgres:5432/prediction
      PREDICTION_REPOSITORY: postgres
      BACKTEST_REPOSITORY: postgres
      WEIGHT_REPOSITORY: postgres
      AI_REPORT_REPOSITORY: postgres
      SOURCE_SNAPSHOT_REPOSITORY: postgres
      HTTPS_PROXY: ${RUNTIME_HTTPS_PROXY:-http://host.docker.internal:10808}
      HTTP_PROXY: ${RUNTIME_HTTP_PROXY:-http://host.docker.internal:10808}
      NO_PROXY: ${RUNTIME_NO_PROXY:-localhost,127.0.0.1,postgres,backend,frontend,host.docker.internal}
    ports:
      - "8000:8000"
    volumes:
      - ./.scratch:/app/.scratch
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
    ports:
      - "13000:3000"
    depends_on:
      - backend

volumes:
  postgres-data:
